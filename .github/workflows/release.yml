name: Build and Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: |
          flutter build apk --release
          flutter build apk --release --split-per-abi

      - name: Extract Changelog Section
        id: extract_changelog
        run: |
          cat << 'EOF' > extract_changelog.dart
          import 'dart:io';
          void main(List<String> args) {
            if (args.isEmpty) {
              print('Usage: dart extract_changelog.dart <version>');
              exit(1);
            }
            final targetVersion = args[0].replaceFirst('v', '');
            final file = File('CHANGELOG.md');
            if (!file.existsSync()) {
              print('CHANGELOG.md not found');
              exit(1);
            }
            final lines = file.readAsLinesSync();
            final targetHeader = '[$targetVersion]';
            bool found = false;
            final releaseNotes = <String>[];
            for (final line in lines) {
              if (line.startsWith('## ')) {
                if (found) break;
                if (line.contains(targetHeader)) {
                  found = true;
                  continue;
                }
              }
              if (found) {
                releaseNotes.add(line);
              }
            }
            if (!found) {
              print('Version $targetVersion not found in CHANGELOG.md');
              exit(1);
            }
            File('release_notes.txt').writeAsStringSync(releaseNotes.join('\n'));
            print('Successfully extracted release notes for $targetVersion');
          }
          EOF
          dart extract_changelog.dart "${{ github.ref_name }}"
          echo "--- Release Notes ---"
          cat release_notes.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/*.apk
          body_path: release_notes.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
